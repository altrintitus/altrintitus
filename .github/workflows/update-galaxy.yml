name: 🌌 Update Galaxy

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at midnight UTC
  workflow_dispatch:        # Lets you trigger it manually anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch real GitHub data & update galaxy
        run: node update-data.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push if changed
        run: |
          git config user.name  "Galaxy Bot 🌌"
          git config user.email "galaxy-bot@altrin7311.github.io"
          git add index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "🌌 Auto-update galaxy data $(date -u +%Y-%m-%d)" && git push)
